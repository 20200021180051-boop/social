<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>


  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }


    body{
      background:#f4f4f4;
      color:#333;
    }


    header{
      background:maroon;
      color:white;
      text-align:center;
      padding:35px;
    }


    header h1{
      font-size:48px;
    }


    header p{
      font-size:22px;
      margin-top:10px;
    }


    nav{
      background:beige;
      text-align:center;
      padding:15px;
    }


    nav a{
      color:black;
      text-decoration:none;
      margin:0 20px;
      font-size:22px;
    }


    nav a:hover{
      color:#00b7ff;
    }


    .container{
      width:85%;
      margin:auto;
      padding:50px 0;
    }


    .contact-box{
      background:white;
      padding:40px;
      border-radius:15px;
      box-shadow:0 3px 12px rgba(0,0,0,0.1);
      text-align:center;
    }


    .contact-box h2{
      color:#0f4c81;
      font-size:38px;
      margin-bottom:20px;
    }


    .contact-box p{
      font-size:24px;
      margin-bottom:20px;
      line-height:1.8;
    }


    .phone{
      background:#3282b8;
      color:white;
      display:inline-block;
      padding:15px 25px;
      border-radius:10px;
      font-size:28px;
      margin-top:20px;
    }


    .image-box{
      margin-top:30px;
    }


    .image-box img{
      width:80%;
      border-radius:15px;
    }


    footer{
      background:#1b262c;
      color:white;
      text-align:center;
      padding:25px;
      margin-top:40px;
      font-size:20px;
    }


    @media(max-width:768px){


      header h1{
        font-size:34px;
      }


      nav a{
        display:block;
        margin:10px 0;
      }


      .contact-box h2{
        font-size:30px;
      }


      .contact-box p{
        font-size:20px;
      }


      .phone{
        font-size:22px;
      }


      .image-box img{
        width:100%;
      }
    }
  </style>
</head>


<body>


  <header>
    <h1>Contact Us</h1>
    <p>We would love to hear from you</p>
  </header>


  <nav>
    <a href="index.html">Home</a>
    <a href="culture.html">Culture</a>
    <a href="effects.html">Effects</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">About us</a>
  </nav>


  <div class="container">


    <div class="contact-box">
      <h2>Get in Touch</h2>


      <p>
        If you have any questions, suggestions, or problems regarding
        Bhutanese culture and the impact of social media, please contact us.
        We are always ready to listen and help.
      </p>


      <div class="phone">
        📞 77267680
      </div>


      <div class="image-box">
        <img src="images/14.PNG">
      </div>


    </div>


  </div>


 

</body>
</html>
